name: Trade Manager（実売買記録）

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '操作'
        required: true
        type: choice
        options:
          - add（エントリー記録）
          - close（決済記録）
          - update_cash（現金残高を更新）
      code:
        description: '銘柄コード（add/close のみ・例: 6921）'
        required: false
        type: string
      price:
        description: '価格（add/close のみ・例: 44490）'
        required: false
        type: string
      shares:
        description: '株数（例: 400）add=購入株数 / close=売却株数（省略時は全決済）'
        required: false
        type: string
      trade_type:
        description: '取引種別（add/close 共通）'
        required: false
        type: choice
        options:
          - cash（現物）
          - margin（制度信用）
          - general_margin（一般信用）
      company:
        description: '会社名（add のみ・任意）'
        required: false
        type: string
      entry_date:
        description: 'エントリー日（add のみ・省略時は今日 YYYY-MM-DD）'
        required: false
        type: string
      exit_date:
        description: '決済日（close のみ・省略時は今日 YYYY-MM-DD）'
        required: false
        type: string
      cash_amount:
        description: '【update_cash専用】現金残高（例: 21772894）'
        required: false
        type: string

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要パッケージをインストール
        run: pip install -r requirements.txt

      - name: config.yaml を生成
        run: |
          cat > config.yaml << 'EOF'
          jquants:
            api_key: "${{ secrets.JQUANTS_API_KEY }}"
          edinet:
            api_key: "${{ secrets.EDINET_API_KEY }}"
          slack:
            webhook_url: "${{ secrets.SLACK_WEBHOOK_URL }}"
          anthropic:
            api_key: "${{ secrets.ANTHROPIC_API_KEY }}"
          paper_trading:
            initial_capital: 3000000
            max_position_size: 300000
            max_positions: 10
          EOF

      - name: エントリー記録
        if: startsWith(github.event.inputs.mode, 'add')
        run: |
          TRADE_TYPE=$(echo "${{ github.event.inputs.trade_type }}" | grep -o '^[a-z_]*')
          python main.py --mode add_trade \
            --code "${{ github.event.inputs.code }}" \
            --price "${{ github.event.inputs.price }}" \
            --shares "${{ github.event.inputs.shares }}" \
            --trade-type "${TRADE_TYPE:-cash}" \
            --company "${{ github.event.inputs.company }}" \
            --entry-date "${{ github.event.inputs.entry_date }}"

      - name: 決済記録
        if: startsWith(github.event.inputs.mode, 'close')
        run: |
          TRADE_TYPE=$(echo "${{ github.event.inputs.trade_type }}" | grep -o '^[a-z_]*')
          EXTRA_ARGS=""
          [ -n "${{ github.event.inputs.shares }}" ]    && EXTRA_ARGS="$EXTRA_ARGS --shares ${{ github.event.inputs.shares }}"
          [ -n "${{ github.event.inputs.exit_date }}" ] && EXTRA_ARGS="$EXTRA_ARGS --exit-date ${{ github.event.inputs.exit_date }}"
          python main.py --mode close_trade \
            --code "${{ github.event.inputs.code }}" \
            --price "${{ github.event.inputs.price }}" \
            --trade-type "${TRADE_TYPE:-cash}" \
            $EXTRA_ARGS

      - name: 現金残高更新
        if: startsWith(github.event.inputs.mode, 'update_cash')
        run: |
          AMOUNT="${{ github.event.inputs.cash_amount }}"
          if [ -z "$AMOUNT" ]; then
            echo "エラー: 現金残高（cash_amount）が入力されていません"
            exit 1
          fi
          python main.py --mode update_cash --price "$AMOUNT"

      - name: trade_log.json を Git コミット
        id: git_commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add memory/trade_log.json
          if git diff --staged --quiet; then
            echo "変更なし（記録失敗の可能性）"
            exit 1
          fi
          git commit -m "data: 実売買記録更新（${{ github.event.inputs.mode }}）[skip ci]"
          for i in 1 2 3; do
            git push && break || {
              echo "push失敗（試行${i}）、pullしてリトライ..."
              git pull --rebase origin main
            }
          done

      - name: Slack通知（記録完了）
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          MODE=$(echo "${{ github.event.inputs.mode }}" | grep -o '^[a-z_]*')
          CODE="${{ github.event.inputs.code }}"
          PRICE="${{ github.event.inputs.price }}"
          SHARES="${{ github.event.inputs.shares }}"
          COMPANY="${{ github.event.inputs.company }}"
          CASH="${{ github.event.inputs.cash_amount }}"
          GIT_RESULT="${{ steps.git_commit.outcome }}"

          if [ "$GIT_RESULT" != "success" ]; then
            TEXT="❌ *Trade Manager 失敗*\n操作: ${MODE}\nGitHubのActionsタブでエラー詳細を確認してください"
          elif [ "$MODE" = "add" ]; then
            AMOUNT=$((${PRICE%.*} * ${SHARES:-0}))
            TEXT="✅ *実売買エントリー記録完了*\n銘柄: \`${CODE}\` ${COMPANY}\n価格: ¥${PRICE} × ${SHARES}株 = ¥${AMOUNT}円"
          elif [ "$MODE" = "update_cash" ]; then
            TEXT="✅ *現金残高更新完了*\n新しい現金残高: ¥${CASH}"
          else
            PARTIAL=""
            [ -n "${SHARES}" ] && PARTIAL=" ${SHARES}株（部分決済）" || PARTIAL="（全決済）"
            TEXT="✅ *実売買決済記録完了*\n銘柄: \`${CODE}\` ${PARTIAL}\n決済価格: ¥${PRICE}\n⚠️ 税引後の実受取額が確定したら現金残高を再設定してください"
          fi

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"${TEXT}\"}"
