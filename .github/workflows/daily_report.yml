name: Daily Report & Scan

on:
  schedule:
    # 朝7:00 JST (UTC 22:00 前日) - スキャン＆シグナル通知
    - cron: '0 22 * * 0-4'   # 日〜木（日本時間の月〜金の朝）
    # 夕方17:00 JST (UTC 08:00) - ポートフォリオ状況レポート
    - cron: '0 8 * * 1-5'    # 月〜金（日本時間の平日夕方）
  workflow_dispatch:           # 手動実行も可能

jobs:
  # ===========================
  # 朝ジョブ: スキャン＆シグナル通知
  # 毎朝7:00 JSTに実行
  # ===========================
  morning-scan:
    runs-on: ubuntu-latest
    # UTC 22:00（= JST 7:00）のときだけ実行
    if: github.event.schedule == '0 22 * * 0-4' || github.event_name == 'workflow_dispatch'
    steps:
      # 1. リポジトリをチェックアウト
      - name: コードを取得
        uses: actions/checkout@v4

      # 2. Pythonをセットアップ
      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 必要パッケージをインストール
      - name: 必要パッケージをインストール
        run: |
          pip install -r requirements.txt

      # 4. config.yaml をシークレットから生成
      - name: config.yaml を生成
        run: |
          cat > config.yaml << 'EOF'
          jquants:
            api_key: "${{ secrets.JQUANTS_API_KEY }}"
          edinet:
            api_key: "${{ secrets.EDINET_API_KEY }}"
          slack:
            webhook_url: "${{ secrets.SLACK_WEBHOOK_URL }}"
          paper_trading:
            initial_capital: 3000000
            max_position_size: 300000
            max_positions: 10
          EOF

      # 5. trade_log.json をキャッシュから復元
      - name: trade_log.json を復元
        uses: actions/cache@v4
        with:
          path: memory/trade_log.json
          key: trade-log-${{ github.run_number }}
          restore-keys: |
            trade-log-

      # 6. 株価データ取得
      - name: 株価データ取得
        run: |
          python main.py --mode fetch
        continue-on-error: true

      # 7. スキャン実行（シグナル検出＆Slack通知）
      - name: スキャン実行
        run: |
          python main.py --mode scan
        continue-on-error: true

      # 8. trade_log.json を保存
      - name: trade_log.json を保存
        uses: actions/cache@v4
        with:
          path: memory/trade_log.json
          key: trade-log-${{ github.run_number }}

  # ===========================
  # 夕方ジョブ: ポートフォリオ状況レポート
  # 毎日17:00 JSTに実行
  # ===========================
  evening-report:
    runs-on: ubuntu-latest
    # UTC 08:00（= JST 17:00）のときだけ実行
    if: github.event.schedule == '0 8 * * 1-5' || github.event_name == 'workflow_dispatch'
    steps:
      # 1. リポジトリをチェックアウト
      - name: コードを取得
        uses: actions/checkout@v4

      # 2. Pythonをセットアップ
      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 必要パッケージをインストール
      - name: 必要パッケージをインストール
        run: |
          pip install -r requirements.txt

      # 4. config.yaml をシークレットから生成
      - name: config.yaml を生成
        run: |
          cat > config.yaml << 'EOF'
          jquants:
            api_key: "${{ secrets.JQUANTS_API_KEY }}"
          edinet:
            api_key: "${{ secrets.EDINET_API_KEY }}"
          slack:
            webhook_url: "${{ secrets.SLACK_WEBHOOK_URL }}"
          paper_trading:
            initial_capital: 3000000
            max_position_size: 300000
            max_positions: 10
          EOF

      # 5. trade_log.json をキャッシュから復元
      - name: trade_log.json を復元
        uses: actions/cache@v4
        with:
          path: memory/trade_log.json
          key: trade-log-${{ github.run_number }}
          restore-keys: |
            trade-log-

      # 6. ポートフォリオ状況をSlackに送信
      - name: 夕方レポート送信
        run: |
          python main.py --mode status --notify
        continue-on-error: true

      # 7. trade_log.json を保存
      - name: trade_log.json を保存
        uses: actions/cache@v4
        with:
          path: memory/trade_log.json
          key: trade-log-${{ github.run_number }}
