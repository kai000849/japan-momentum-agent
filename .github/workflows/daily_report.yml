name: Daily Report & Scan

on:
  schedule:
    # 【朝1】米市場スキャン専用 6:30 JST (UTC 21:30 前日)
    # 米国市場終了（JST 6:00）直後に実行。GitHub Actions遅延を考慮して30分後に設定。
    - cron: '30 21 * * 0-5'   # 日〜金（月〜土のJST朝6:30）

    # 【朝2】日本株スキャン＆保有状況 6:30 JST (UTC 21:30 前日)
    # 米市場スキャン（朝1ジョブ）と同時刻に並行実行。
    # → us_scan結果は当日夕方通知で参照するため、並行でも問題なし。

    # 【正午】後場エントリー判断 12:15 JST (UTC 3:15)
    # 前場の値動きをyfinanceで確認（15分遅延・無料）→ 後場12:30エントリー可否をSlack通知
    - cron: '15 3 * * 1-5'    # 月〜金（日本時間の平日正午12:15）

    # 【夕方】メイン通知 18:30 JST (UTC 09:30)
    - cron: '30 9 * * 1-5'    # 月〜金（日本時間の平日夕方18:30）

    # 【週次】金曜パフォーマンスレポート 18:30 JST (UTC 09:30)
    - cron: '30 9 * * 5'  # 毎週金曜（日本時間18:30・夕方スキャンと同時刻）

  workflow_dispatch:           # 手動実行も可能

jobs:
  # ===========================
  # 朝1ジョブ: 米市場スキャン（単独・早朝）
  # 米国市場終了直後 JST 6:30頃に実行
  # ===========================
  us-market-scan:
    runs-on: ubuntu-latest
    if: github.event.schedule == '30 21 * * 0-5' || github.event_name == 'workflow_dispatch'
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要パッケージをインストール
        run: |
          pip install -r requirements.txt

      - name: config.yaml を生成
        run: |
          cat > config.yaml << 'EOF'
          jquants:
            api_key: "${{ secrets.JQUANTS_API_KEY }}"
          edinet:
            api_key: "${{ secrets.EDINET_API_KEY }}"
          slack:
            webhook_url: "${{ secrets.SLACK_WEBHOOK_URL }}"
          anthropic:
            api_key: "${{ secrets.ANTHROPIC_API_KEY }}"
          paper_trading:
            initial_capital: 3000000
            max_position_size: 300000
            max_positions: 10
          EOF

      - name: 今日の日付を設定（クロスジョブキャッシュキー用）
        id: date
        run: echo "today=$(date -u '+%Y%m%d')" >> $GITHUB_OUTPUT

      - name: 米市場スキャン実行（ETFモメンタム＋テーマ抽出）
        id: us_scan
        run: |
          python main.py --mode us_scan
        continue-on-error: true

      - name: us_scans を保存（morning-scan受け渡し用・日付キー）
        uses: actions/cache@v4
        with:
          path: data/processed/us_scans
          key: us-scans-${{ steps.date.outputs.today }}

      - name: us_themes を保存（morning-scan受け渡し用・日付キー）
        uses: actions/cache@v4
        with:
          path: data/processed/us_themes
          key: us-themes-${{ steps.date.outputs.today }}

      - name: エラー通知
        if: steps.us_scan.outcome == 'failure'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"⚠️ *米市場スキャン（朝1ジョブ）でエラー発生*\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

  # ===========================
  # 朝2ジョブ: 日本株スキャン＆保有状況
  # us-market-scan完了後に実行（米セクター結果を朝通知に反映）
  # ===========================
  morning-scan:
    runs-on: ubuntu-latest
    needs: us-market-scan
    if: always() && (github.event.schedule == '30 21 * * 0-5' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: write
    steps:
      - name: 今日の日付を設定（クロスジョブキャッシュキー用）
        id: date
        run: echo "today=$(date -u '+%Y%m%d')" >> $GITHUB_OUTPUT

      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要パッケージをインストール
        run: |
          pip install -r requirements.txt

      - name: config.yaml を生成
        run: |
          cat > config.yaml << 'EOF'
          jquants:
            api_key: "${{ secrets.JQUANTS_API_KEY }}"
          edinet:
            api_key: "${{ secrets.EDINET_API_KEY }}"
          slack:
            webhook_url: "${{ secrets.SLACK_WEBHOOK_URL }}"
          anthropic:
            api_key: "${{ secrets.ANTHROPIC_API_KEY }}"
          paper_trading:
            initial_capital: 3000000
            max_position_size: 300000
            max_positions: 10
          EOF

      - name: us_scans を復元（us-market-scan完了分・日付キー）
        uses: actions/cache@v4
        with:
          path: data/processed/us_scans
          key: us-scans-${{ steps.date.outputs.today }}
          restore-keys: |
            us-scans-

      - name: us_themes を復元（us-market-scan完了分・日付キー）
        uses: actions/cache@v4
        with:
          path: data/processed/us_themes
          key: us-themes-${{ steps.date.outputs.today }}
          restore-keys: |
            us-themes-

      - name: trade_log.json を復元
        uses: actions/cache@v4
        with:
          path: memory/trade_log.json
          key: trade-log-${{ github.run_number }}
          restore-keys: |
            trade-log-

      - name: qualify_log.json を復元
        uses: actions/cache@v4
        with:
          path: memory/qualify_log.json
          key: qualify-log-${{ github.run_number }}
          restore-keys: |
            qualify-log-

      - name: スキャン結果キャッシュを復元
        uses: actions/cache@v4
        with:
          path: data/processed/scans
          key: scans-${{ github.run_number }}
          restore-keys: |
            scans-

      - name: 株価データ取得（150日分・75日MA計算に必要）
        id: fetch
        run: |
          python main.py --mode fetch --days 150
        continue-on-error: true

      - name: スキャン実行（シグナル検出＆Slack通知）
        id: scan
        run: |
          python main.py --mode scan
        continue-on-error: true

      - name: 保有状況をSlackに送信
        id: status
        run: |
          python main.py --mode status --notify
        continue-on-error: true

      - name: trade_log.json を保存
        uses: actions/cache@v4
        with:
          path: memory/trade_log.json
          key: trade-log-${{ github.run_number }}

      - name: qualify_log.json を保存
        uses: actions/cache@v4
        with:
          path: memory/qualify_log.json
          key: qualify-log-${{ github.run_number }}

      - name: momentum_log.json を保存
        uses: actions/cache@v4
        with:
          path: memory/momentum_log.json
          key: momentum-log-${{ github.run_number }}

      - name: qualify_log.json / momentum_log.json を Git コミット（学習ループ永続化）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/qualify_log.json memory/momentum_log.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: qualify_log/momentum_log更新（朝スキャン） [skip ci]"
          git push
        continue-on-error: true

      - name: スキャン結果キャッシュを保存（日付キー・noon-scan受け渡し用）
        uses: actions/cache@v4
        with:
          path: data/processed/scans
          key: scans-${{ steps.date.outputs.today }}

      - name: エラー通知
        if: steps.fetch.outcome == 'failure' || steps.scan.outcome == 'failure' || steps.status.outcome == 'failure'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          ERRORS=""
          [ "${{ steps.fetch.outcome }}" = "failure" ] && ERRORS="${ERRORS}・株価データ取得(fetch)\n"
          [ "${{ steps.scan.outcome }}" = "failure" ]  && ERRORS="${ERRORS}・スキャン実行(scan)\n"
          [ "${{ steps.status.outcome }}" = "failure" ] && ERRORS="${ERRORS}・保有状況通知(status)\n"
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"⚠️ *GitHub Actions 朝2ジョブでエラー発生*\n失敗ステップ:\n${ERRORS}\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

  # ===========================
  # 夕方ジョブ: スキャン＆シグナル＆保有状況（メイン通知）
  # 毎日18:00 JST頃に実行
  # ===========================
  evening-scan:
    runs-on: ubuntu-latest
    if: github.event.schedule == '30 9 * * 1-5' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: 今日の日付を設定（クロスジョブキャッシュキー用）
        id: date
        run: echo "today=$(date -u '+%Y%m%d')" >> $GITHUB_OUTPUT

      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要パッケージをインストール
        run: |
          pip install -r requirements.txt

      - name: config.yaml を生成
        run: |
          cat > config.yaml << 'EOF'
          jquants:
            api_key: "${{ secrets.JQUANTS_API_KEY }}"
          edinet:
            api_key: "${{ secrets.EDINET_API_KEY }}"
          slack:
            webhook_url: "${{ secrets.SLACK_WEBHOOK_URL }}"
          anthropic:
            api_key: "${{ secrets.ANTHROPIC_API_KEY }}"
          paper_trading:
            initial_capital: 3000000
            max_position_size: 300000
            max_positions: 10
          EOF

      - name: trade_log.json を復元
        uses: actions/cache@v4
        with:
          path: memory/trade_log.json
          key: trade-log-${{ github.run_number }}
          restore-keys: |
            trade-log-

      - name: qualify_log.json を復元
        uses: actions/cache@v4
        with:
          path: memory/qualify_log.json
          key: qualify-log-${{ github.run_number }}
          restore-keys: |
            qualify-log-

      - name: momentum_log.json を復元
        uses: actions/cache@v4
        with:
          path: memory/momentum_log.json
          key: momentum-log-${{ github.run_number }}
          restore-keys: |
            momentum-log-

      - name: スキャン結果キャッシュを復元
        uses: actions/cache@v4
        with:
          path: data/processed/scans
          key: scans-${{ github.run_number }}
          restore-keys: |
            scans-

      - name: 株価データ取得（150日分・75日MA計算に必要）
        id: fetch
        run: |
          python main.py --mode fetch --days 150
        continue-on-error: true

      - name: スキャン実行（シグナル検出＆Slack通知）
        id: scan
        run: |
          python main.py --mode scan
        continue-on-error: true

      - name: 保有状況をSlackに送信
        id: status
        run: |
          python main.py --mode status --notify
        continue-on-error: true

      - name: trade_log.json を保存
        uses: actions/cache@v4
        with:
          path: memory/trade_log.json
          key: trade-log-${{ github.run_number }}

      - name: qualify_log.json を保存
        uses: actions/cache@v4
        with:
          path: memory/qualify_log.json
          key: qualify-log-${{ github.run_number }}

      - name: momentum_log.json を保存
        uses: actions/cache@v4
        with:
          path: memory/momentum_log.json
          key: momentum-log-${{ github.run_number }}

      - name: qualify_log.json / momentum_log.json を Git コミット（学習ループ永続化）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add memory/qualify_log.json memory/momentum_log.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: qualify_log/momentum_log更新（夕方スキャン） [skip ci]"
          git push
        continue-on-error: true

      - name: スキャン結果キャッシュを保存
        uses: actions/cache@v4
        with:
          path: data/processed/scans
          key: scans-${{ github.run_number }}

      - name: エラー通知
        if: steps.fetch.outcome == 'failure' || steps.scan.outcome == 'failure' || steps.status.outcome == 'failure'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          ERRORS=""
          [ "${{ steps.fetch.outcome }}" = "failure" ] && ERRORS="${ERRORS}・株価データ取得(fetch)\n"
          [ "${{ steps.scan.outcome }}" = "failure" ]  && ERRORS="${ERRORS}・スキャン実行(scan)\n"
          [ "${{ steps.status.outcome }}" = "failure" ] && ERRORS="${ERRORS}・保有状況通知(status)\n"
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"⚠️ *GitHub Actions 夕方ジョブでエラー発生*\n失敗ステップ:\n${ERRORS}\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

  # ===========================
  # 正午ジョブ: 後場エントリー判断
  # 前場の値動きをyfinanceで確認 JST 12:15頃に実行
  # ===========================
  noon-scan:
    runs-on: ubuntu-latest
    if: github.event.schedule == '15 3 * * 1-5' || github.event_name == 'workflow_dispatch'
    steps:
      - name: 今日の日付を設定（クロスジョブキャッシュキー用）
        id: date
        run: echo "today=$(date -u '+%Y%m%d')" >> $GITHUB_OUTPUT

      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要パッケージをインストール
        run: |
          pip install -r requirements.txt

      - name: config.yaml を生成
        run: |
          cat > config.yaml << 'EOF'
          jquants:
            api_key: "${{ secrets.JQUANTS_API_KEY }}"
          edinet:
            api_key: "${{ secrets.EDINET_API_KEY }}"
          slack:
            webhook_url: "${{ secrets.SLACK_WEBHOOK_URL }}"
          anthropic:
            api_key: "${{ secrets.ANTHROPIC_API_KEY }}"
          paper_trading:
            initial_capital: 3000000
            max_position_size: 300000
            max_positions: 10
          EOF

      - name: qualify_log を復元（morning-scanが当日保存したもの）
        uses: actions/cache@v4
        with:
          path: memory/qualify_log.json
          key: qualify-log-${{ github.run_number }}
          restore-keys: |
            qualify-log-

      - name: スキャン結果キャッシュを復元（morning-scanが当日保存したもの・日付キー）
        uses: actions/cache@v4
        with:
          path: data/processed/scans
          key: scans-${{ steps.date.outputs.today }}
          restore-keys: |
            scans-

      - name: 正午スキャン実行（前場値動き確認・後場エントリー判断）
        id: noon
        run: |
          python main.py --mode noon_scan
        continue-on-error: true

      - name: エラー通知
        if: steps.noon.outcome == 'failure'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"⚠️ *正午スキャンでエラー発生*\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

  # ===========================
  # 週次ジョブ: パフォーマンスレポート
  # 毎週金曜18:00 JST (UTC 09:00)に実行
  # ===========================
  weekly-report:
    runs-on: ubuntu-latest
    if: (github.event.schedule == '30 9 * * 5') || github.event_name == 'workflow_dispatch'
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要パッケージをインストール
        run: |
          pip install -r requirements.txt

      - name: config.yaml を生成
        run: |
          cat > config.yaml << 'EOF'
          jquants:
            api_key: "${{ secrets.JQUANTS_API_KEY }}"
          edinet:
            api_key: "${{ secrets.EDINET_API_KEY }}"
          slack:
            webhook_url: "${{ secrets.SLACK_WEBHOOK_URL }}"
          anthropic:
            api_key: "${{ secrets.ANTHROPIC_API_KEY }}"
          paper_trading:
            initial_capital: 3000000
            max_position_size: 300000
            max_positions: 10
          EOF

      - name: trade_log.json を復元
        uses: actions/cache@v4
        with:
          path: memory/trade_log.json
          key: trade-log-${{ github.run_number }}
          restore-keys: |
            trade-log-

      - name: qualify_log.json を復元
        uses: actions/cache@v4
        with:
          path: memory/qualify_log.json
          key: qualify-log-${{ github.run_number }}
          restore-keys: |
            qualify-log-

      - name: momentum_log.json を復元
        uses: actions/cache@v4
        with:
          path: memory/momentum_log.json
          key: momentum-log-${{ github.run_number }}
          restore-keys: |
            momentum-log-

      - name: 週次レポート送信
        id: weekly
        run: |
          python main.py --mode weekly_report
        continue-on-error: true

      - name: エラー通知
        if: steps.weekly.outcome == 'failure'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"⚠️ *週次レポートでエラー発生*\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
