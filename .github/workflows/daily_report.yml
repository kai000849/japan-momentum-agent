name: Daily Report & Scan

on:
  schedule:
    # 【朝1】米市場スキャン専用 6:30 JST (UTC 21:30 前日)
    # 米国市場終了（JST 6:00）直後に実行。GitHub Actions遅延を考慮して30分後に設定。
    - cron: '30 21 * * 0-5'   # 日〜金（月〜土のJST朝6:30）

    # 【朝2】日本株スキャン＆保有状況 6:30 JST (UTC 21:30 前日)
    # 米市場スキャン（朝1ジョブ）と同時刻に並行実行。
    # → us_scan結果は当日夕方通知で参照するため、並行でも問題なし。

    # 【前場中盤】ザラ場決算モメンタムスキャン 10:30 JST (UTC 1:30)
    # 前日決算発表銘柄の寄り付き反応を確認してエントリー判断
    - cron: '30 1 * * 1-5'    # 月〜金（日本時間の平日前場中盤10:30）

    # 【正午】後場エントリー判断 12:15 JST (UTC 3:15)
    # 前場の値動きをyfinanceで確認（15分遅延・無料）→ 後場12:30エントリー可否をSlack通知
    - cron: '15 3 * * 1-5'    # 月〜金（日本時間の平日正午12:15）

    # 【夕方】メイン通知 18:00 JST (UTC 09:00)
    # 夕方のシグナル確認＆保有状況通知（米市場スキャンなし・朝の結果を参照）
    - cron: '0 9 * * 1-5'     # 月〜金（日本時間の平日夕方18:00）

  workflow_dispatch:           # 手動実行も可能

jobs:
  # ===========================
  # 朝1ジョブ: 米市場スキャン（単独・早朝）
  # 米国市場終了直後 JST 6:30頃に実行
  # ===========================
  us-market-scan:
    runs-on: ubuntu-latest
    if: github.event.schedule == '30 21 * * 0-5' || github.event_name == 'workflow_dispatch'
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要パッケージをインストール
        run: |
          pip install -r requirements.txt

      - name: config.yaml を生成
        run: |
          cat > config.yaml << 'EOF'
          jquants:
            api_key: "${{ secrets.JQUANTS_API_KEY }}"
          edinet:
            api_key: "${{ secrets.EDINET_API_KEY }}"
          slack:
            webhook_url: "${{ secrets.SLACK_WEBHOOK_URL }}"
          anthropic:
            api_key: "${{ secrets.ANTHROPIC_API_KEY }}"
          paper_trading:
            initial_capital: 3000000
            max_position_size: 300000
            max_positions: 10
          EOF

      - name: 米市場スキャン実行（ETFモメンタム＋テーマ抽出）
        id: us_scan
        run: |
          python main.py --mode us_scan
        continue-on-error: true

      - name: エラー通知
        if: steps.us_scan.outcome == 'failure'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"⚠️ *米市場スキャン（朝1ジョブ）でエラー発生*\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

  # ===========================
  # 朝2ジョブ: 日本株スキャン＆保有状況
  # JST 8:00頃に実行（米市場結果取得済みの状態）
  # ===========================
  morning-scan:
    runs-on: ubuntu-latest
    if: github.event.schedule == '30 21 * * 0-5' || github.event_name == 'workflow_dispatch'
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要パッケージをインストール
        run: |
          pip install -r requirements.txt

      - name: config.yaml を生成
        run: |
          cat > config.yaml << 'EOF'
          jquants:
            api_key: "${{ secrets.JQUANTS_API_KEY }}"
          edinet:
            api_key: "${{ secrets.EDINET_API_KEY }}"
          slack:
            webhook_url: "${{ secrets.SLACK_WEBHOOK_URL }}"
          anthropic:
            api_key: "${{ secrets.ANTHROPIC_API_KEY }}"
          paper_trading:
            initial_capital: 3000000
            max_position_size: 300000
            max_positions: 10
          EOF

      - name: trade_log.json を復元
        uses: actions/cache@v4
        with:
          path: memory/trade_log.json
          key: trade-log-${{ github.run_number }}
          restore-keys: |
            trade-log-

      - name: qualify_log.json を復元
        uses: actions/cache@v4
        with:
          path: memory/qualify_log.json
          key: qualify-log-${{ github.run_number }}
          restore-keys: |
            qualify-log-

      - name: スキャン結果キャッシュを復元
        uses: actions/cache@v4
        with:
          path: data/processed/scans
          key: scans-${{ github.run_number }}
          restore-keys: |
            scans-

      - name: EDINET分析キャッシュを復元
        uses: actions/cache@v4
        with:
          path: data/processed/edinet_analysis_cache.json
          key: edinet-cache-${{ github.run_number }}
          restore-keys: |
            edinet-cache-

      - name: TDnet開示キャッシュを復元
        uses: actions/cache@v4
        with:
          path: data/raw/tdnet
          key: tdnet-${{ github.run_number }}
          restore-keys: |
            tdnet-

      - name: 株価データ取得（150日分・75日MA計算に必要）
        id: fetch
        run: |
          python main.py --mode fetch --days 150
        continue-on-error: true

      - name: スキャン実行（シグナル検出＆Slack通知）
        id: scan
        run: |
          python main.py --mode scan
        continue-on-error: true

      - name: 保有状況をSlackに送信
        id: status
        run: |
          python main.py --mode status --notify
        continue-on-error: true

      - name: trade_log.json を保存
        uses: actions/cache@v4
        with:
          path: memory/trade_log.json
          key: trade-log-${{ github.run_number }}

      - name: qualify_log.json を保存
        uses: actions/cache@v4
        with:
          path: memory/qualify_log.json
          key: qualify-log-${{ github.run_number }}

      - name: スキャン結果キャッシュを保存
        uses: actions/cache@v4
        with:
          path: data/processed/scans
          key: scans-${{ github.run_number }}

      - name: EDINET分析キャッシュを保存
        uses: actions/cache@v4
        with:
          path: data/processed/edinet_analysis_cache.json
          key: edinet-cache-${{ github.run_number }}

      - name: TDnet開示キャッシュを保存
        uses: actions/cache@v4
        with:
          path: data/raw/tdnet
          key: tdnet-${{ github.run_number }}

      - name: earnings_watchlist を保存（ザラ場・引け後スキャン用）
        uses: actions/cache@v4
        with:
          path: memory/earnings_watchlist.json
          key: earnings-watchlist-${{ github.run_number }}

      - name: earnings_followup_list を保存（中長期追跡用）
        uses: actions/cache@v4
        with:
          path: memory/earnings_followup_list.json
          key: earnings-followup-${{ github.run_number }}

      - name: エラー通知
        if: steps.fetch.outcome == 'failure' || steps.scan.outcome == 'failure' || steps.status.outcome == 'failure'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          ERRORS=""
          [ "${{ steps.fetch.outcome }}" = "failure" ] && ERRORS="${ERRORS}・株価データ取得(fetch)\n"
          [ "${{ steps.scan.outcome }}" = "failure" ]  && ERRORS="${ERRORS}・スキャン実行(scan)\n"
          [ "${{ steps.status.outcome }}" = "failure" ] && ERRORS="${ERRORS}・保有状況通知(status)\n"
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"⚠️ *GitHub Actions 朝2ジョブでエラー発生*\n失敗ステップ:\n${ERRORS}\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

  # ===========================
  # 夕方ジョブ: スキャン＆シグナル＆保有状況（メイン通知）
  # 毎日18:00 JST頃に実行
  # ===========================
  evening-scan:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 9 * * 1-5' || github.event_name == 'workflow_dispatch'
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要パッケージをインストール
        run: |
          pip install -r requirements.txt

      - name: config.yaml を生成
        run: |
          cat > config.yaml << 'EOF'
          jquants:
            api_key: "${{ secrets.JQUANTS_API_KEY }}"
          edinet:
            api_key: "${{ secrets.EDINET_API_KEY }}"
          slack:
            webhook_url: "${{ secrets.SLACK_WEBHOOK_URL }}"
          anthropic:
            api_key: "${{ secrets.ANTHROPIC_API_KEY }}"
          paper_trading:
            initial_capital: 3000000
            max_position_size: 300000
            max_positions: 10
          EOF

      - name: trade_log.json を復元
        uses: actions/cache@v4
        with:
          path: memory/trade_log.json
          key: trade-log-${{ github.run_number }}
          restore-keys: |
            trade-log-

      - name: qualify_log.json を復元
        uses: actions/cache@v4
        with:
          path: memory/qualify_log.json
          key: qualify-log-${{ github.run_number }}
          restore-keys: |
            qualify-log-

      - name: スキャン結果キャッシュを復元
        uses: actions/cache@v4
        with:
          path: data/processed/scans
          key: scans-${{ github.run_number }}
          restore-keys: |
            scans-

      - name: EDINET分析キャッシュを復元
        uses: actions/cache@v4
        with:
          path: data/processed/edinet_analysis_cache.json
          key: edinet-cache-${{ github.run_number }}
          restore-keys: |
            edinet-cache-

      - name: TDnet開示キャッシュを復元
        uses: actions/cache@v4
        with:
          path: data/raw/tdnet
          key: tdnet-${{ github.run_number }}
          restore-keys: |
            tdnet-

      - name: earnings_watchlist を復元（引け後スキャン用）
        uses: actions/cache@v4
        with:
          path: memory/earnings_watchlist.json
          key: earnings-watchlist-${{ github.run_number }}
          restore-keys: |
            earnings-watchlist-

      - name: earnings_signal_log を復元
        uses: actions/cache@v4
        with:
          path: memory/earnings_signal_log.json
          key: earnings-signal-log-${{ github.run_number }}
          restore-keys: |
            earnings-signal-log-

      - name: earnings_followup_list を復元（中長期追跡用）
        uses: actions/cache@v4
        with:
          path: memory/earnings_followup_list.json
          key: earnings-followup-${{ github.run_number }}
          restore-keys: |
            earnings-followup-

      - name: 株価データ取得（150日分・75日MA計算に必要）
        id: fetch
        run: |
          python main.py --mode fetch --days 150
        continue-on-error: true

      - name: スキャン実行（シグナル検出＆Slack通知）
        id: scan
        run: |
          python main.py --mode scan
        continue-on-error: true

      - name: 保有状況をSlackに送信
        id: status
        run: |
          python main.py --mode status --notify
        continue-on-error: true

      - name: 引け後決算モメンタム評価（J-Quants日足・18:00通知）
        id: endofday
        run: |
          python main.py --mode earnings_endofday
        continue-on-error: true

      - name: trade_log.json を保存
        uses: actions/cache@v4
        with:
          path: memory/trade_log.json
          key: trade-log-${{ github.run_number }}

      - name: qualify_log.json を保存
        uses: actions/cache@v4
        with:
          path: memory/qualify_log.json
          key: qualify-log-${{ github.run_number }}

      - name: スキャン結果キャッシュを保存
        uses: actions/cache@v4
        with:
          path: data/processed/scans
          key: scans-${{ github.run_number }}

      - name: EDINET分析キャッシュを保存
        uses: actions/cache@v4
        with:
          path: data/processed/edinet_analysis_cache.json
          key: edinet-cache-${{ github.run_number }}

      - name: TDnet開示キャッシュを保存
        uses: actions/cache@v4
        with:
          path: data/raw/tdnet
          key: tdnet-${{ github.run_number }}

      - name: earnings_watchlist を保存（翌朝ザラ場スキャン用）
        uses: actions/cache@v4
        with:
          path: memory/earnings_watchlist.json
          key: earnings-watchlist-${{ github.run_number }}

      - name: earnings_signal_log を保存
        uses: actions/cache@v4
        with:
          path: memory/earnings_signal_log.json
          key: earnings-signal-log-${{ github.run_number }}

      - name: earnings_followup_list を保存（中長期追跡用）
        uses: actions/cache@v4
        with:
          path: memory/earnings_followup_list.json
          key: earnings-followup-${{ github.run_number }}

      - name: エラー通知
        if: steps.fetch.outcome == 'failure' || steps.scan.outcome == 'failure' || steps.status.outcome == 'failure'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          ERRORS=""
          [ "${{ steps.fetch.outcome }}" = "failure" ] && ERRORS="${ERRORS}・株価データ取得(fetch)\n"
          [ "${{ steps.scan.outcome }}" = "failure" ]  && ERRORS="${ERRORS}・スキャン実行(scan)\n"
          [ "${{ steps.status.outcome }}" = "failure" ] && ERRORS="${ERRORS}・保有状況通知(status)\n"
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"⚠️ *GitHub Actions 夕方ジョブでエラー発生*\n失敗ステップ:\n${ERRORS}\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

  # ===========================
  # 前場中盤ジョブ: ザラ場決算モメンタムスキャン
  # 前日決算発表銘柄の寄り付き反応を確認 JST 10:30頃に実行
  # ===========================
  midmorning-scan:
    runs-on: ubuntu-latest
    if: github.event.schedule == '30 1 * * 1-5' || github.event_name == 'workflow_dispatch'
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要パッケージをインストール
        run: |
          pip install -r requirements.txt

      - name: config.yaml を生成
        run: |
          cat > config.yaml << 'EOF'
          jquants:
            api_key: "${{ secrets.JQUANTS_API_KEY }}"
          edinet:
            api_key: "${{ secrets.EDINET_API_KEY }}"
          slack:
            webhook_url: "${{ secrets.SLACK_WEBHOOK_URL }}"
          anthropic:
            api_key: "${{ secrets.ANTHROPIC_API_KEY }}"
          paper_trading:
            initial_capital: 3000000
            max_position_size: 300000
            max_positions: 10
          EOF

      - name: earnings_watchlist を復元（前日夕方・朝のスキャン結果）
        uses: actions/cache@v4
        with:
          path: memory/earnings_watchlist.json
          key: earnings-watchlist-${{ github.run_number }}
          restore-keys: |
            earnings-watchlist-

      - name: earnings_signal_log を復元
        uses: actions/cache@v4
        with:
          path: memory/earnings_signal_log.json
          key: earnings-signal-log-${{ github.run_number }}
          restore-keys: |
            earnings-signal-log-

      - name: qualify_log を復元（結果記録用）
        uses: actions/cache@v4
        with:
          path: memory/qualify_log.json
          key: qualify-log-${{ github.run_number }}
          restore-keys: |
            qualify-log-

      - name: 株価データ取得（学習ループ用・軽量版）
        id: fetch
        run: |
          python main.py --mode fetch --days 30
        continue-on-error: true

      - name: ザラ場決算モメンタムスキャン実行
        id: intraday
        run: |
          python main.py --mode earnings_intraday
        continue-on-error: true

      - name: earnings_watchlist を保存
        uses: actions/cache@v4
        with:
          path: memory/earnings_watchlist.json
          key: earnings-watchlist-${{ github.run_number }}

      - name: earnings_signal_log を保存
        uses: actions/cache@v4
        with:
          path: memory/earnings_signal_log.json
          key: earnings-signal-log-${{ github.run_number }}

      - name: エラー通知
        if: steps.intraday.outcome == 'failure'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"⚠️ *ザラ場決算スキャンでエラー発生*\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

  # ===========================
  # 正午ジョブ: 後場エントリー判断
  # 前場の値動きをyfinanceで確認 JST 12:15頃に実行
  # ===========================
  noon-scan:
    runs-on: ubuntu-latest
    if: github.event.schedule == '15 3 * * 1-5' || github.event_name == 'workflow_dispatch'
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要パッケージをインストール
        run: |
          pip install -r requirements.txt

      - name: config.yaml を生成
        run: |
          cat > config.yaml << 'EOF'
          jquants:
            api_key: "${{ secrets.JQUANTS_API_KEY }}"
          edinet:
            api_key: "${{ secrets.EDINET_API_KEY }}"
          slack:
            webhook_url: "${{ secrets.SLACK_WEBHOOK_URL }}"
          anthropic:
            api_key: "${{ secrets.ANTHROPIC_API_KEY }}"
          paper_trading:
            initial_capital: 3000000
            max_position_size: 300000
            max_positions: 10
          EOF

      - name: qualify_log を復元（STRONG/WATCH対象銘柄の取得）
        uses: actions/cache@v4
        with:
          path: memory/qualify_log.json
          key: qualify-log-${{ github.run_number }}
          restore-keys: |
            qualify-log-

      - name: スキャン結果キャッシュを復元（朝スキャンの結果）
        uses: actions/cache@v4
        with:
          path: data/processed/scans
          key: scans-${{ github.run_number }}
          restore-keys: |
            scans-

      - name: 正午スキャン実行（前場値動き確認・後場エントリー判断）
        id: noon
        run: |
          python main.py --mode noon_scan
        continue-on-error: true

      - name: エラー通知
        if: steps.noon.outcome == 'failure'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\":\"⚠️ *正午スキャンでエラー発生*\nhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
