name: Daily Report & Scan

on:
  schedule:
    # 夕方18:00 JST (UTC 09:00) - メイン通知（スキャン＋保有状況）
    - cron: '0 9 * * 1-5'    # 月〜金（日本時間の平日夕方）
    # 翌朝6:00 JST (UTC 21:00 前日) - 朝通知（再スキャン＋保有状況＋米市場）
    - cron: '0 21 * * 0-4'   # 日〜木（日本時間の月〜金の朝）
  workflow_dispatch:           # 手動実行も可能

jobs:
  # ===========================
  # 夕方ジョブ: スキャン＆シグナル＆保有状況（メイン通知）
  # 毎日18:00 JST頃に実行
  # ===========================
  evening-scan:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 9 * * 1-5' || github.event_name == 'workflow_dispatch'
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要パッケージをインストール
        run: |
          pip install -r requirements.txt

      - name: config.yaml を生成
        run: |
          cat > config.yaml << 'EOF'
          jquants:
            api_key: "${{ secrets.JQUANTS_API_KEY }}"
          edinet:
            api_key: "${{ secrets.EDINET_API_KEY }}"
          slack:
            webhook_url: "${{ secrets.SLACK_WEBHOOK_URL }}"
          anthropic:
            api_key: "${{ secrets.ANTHROPIC_API_KEY }}"
          paper_trading:
            initial_capital: 3000000
            max_position_size: 300000
            max_positions: 10
          EOF

      - name: trade_log.json を復元
        uses: actions/cache@v4
        with:
          path: memory/trade_log.json
          key: trade-log-${{ github.run_number }}
          restore-keys: |
            trade-log-

      - name: 株価データ取得
        run: |
          python main.py --mode fetch
        continue-on-error: true

      - name: スキャン実行（シグナル検出＆Slack通知）
        run: |
          python main.py --mode scan
        continue-on-error: true

      - name: 保有状況をSlackに送信
        run: |
          python main.py --mode status --notify
        continue-on-error: true

      - name: trade_log.json を保存
        uses: actions/cache@v4
        with:
          path: memory/trade_log.json
          key: trade-log-${{ github.run_number }}

  # ===========================
  # 朝ジョブ: 再スキャン＆保有状況＆米市場スキャン
  # 毎朝6:00 JST頃に実行
  # ===========================
  morning-scan:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 21 * * 0-4' || github.event_name == 'workflow_dispatch'
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要パッケージをインストール
        run: |
          pip install -r requirements.txt
          pip install yfinance

      - name: config.yaml を生成
        run: |
          cat > config.yaml << 'EOF'
          jquants:
            api_key: "${{ secrets.JQUANTS_API_KEY }}"
          edinet:
            api_key: "${{ secrets.EDINET_API_KEY }}"
          slack:
            webhook_url: "${{ secrets.SLACK_WEBHOOK_URL }}"
          anthropic:
            api_key: "${{ secrets.ANTHROPIC_API_KEY }}"
          paper_trading:
            initial_capital: 3000000
            max_position_size: 300000
            max_positions: 10
          EOF

      - name: trade_log.json を復元
        uses: actions/cache@v4
        with:
          path: memory/trade_log.json
          key: trade-log-${{ github.run_number }}
          restore-keys: |
            trade-log-

      - name: 株価データ取得
        run: |
          python main.py --mode fetch
        continue-on-error: true

      - name: スキャン実行（シグナル検出＆Slack通知）
        run: |
          python main.py --mode scan
        continue-on-error: true

      - name: 保有状況をSlackに送信
        run: |
          python main.py --mode status --notify
        continue-on-error: true

      - name: 米市場スキャン実行
        run: |
          python main.py --mode us_scan
        continue-on-error: true

      - name: trade_log.json を保存
        uses: actions/cache@v4
        with:
          path: memory/trade_log.json
          key: trade-log-${{ github.run_number }}
